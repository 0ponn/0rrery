<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orrery Session Playback</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { color: #00ccaa; margin-bottom: 20px; font-size: 24px; }

    .controls {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .control-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 15px;
    }

    select, button, input {
      padding: 10px 16px;
      background: #0f0f1a;
      border: 1px solid #3a3a4e;
      color: #e0e0e0;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
    }

    select:hover, button:hover { background: #1a1a2e; }
    button.primary { background: #00ccaa; color: #0a0a0f; font-weight: 600; }
    button.primary:hover { background: #00ddbb; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #1a1a2e;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ccaa, #00ddbb);
      transition: width 0.1s linear;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      padding: 15px;
    }

    .stat-label { font-size: 11px; color: #808080; margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 600; color: #00ccaa; }

    .event-stream {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 20px;
      max-height: 600px;
      overflow-y: auto;
    }

    .event {
      background: #0f0f1a;
      border-left: 3px solid #00ccaa;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
    }

    .event-time { color: #808080; margin-right: 12px; }
    .event-type { color: #00ccaa; font-weight: 600; margin-right: 8px; }
    .event-current { border-left-color: #ffaa00; background: #2a2210; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📹 Orrery Session Playback</h1>

    <div class="controls">
      <div class="control-row">
        <label>Session:</label>
        <select id="sessionSelect" style="flex: 1;">
          <option value="">Select a session...</option>
        </select>
        <button onclick="loadSession()" class="primary">Load</button>
      </div>

      <div class="control-row">
        <button id="playBtn" onclick="togglePlay()" disabled>▶ Play</button>
        <button onclick="reset()" disabled id="resetBtn">⏹ Reset</button>
        <select id="speedSelect" onchange="updateSpeed()">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="2">2x</option>
          <option value="5">5x</option>
          <option value="10">10x</option>
        </select>
        <span id="progressText" style="color: #808080; font-size: 12px;">0 / 0</span>
      </div>

      <div class="progress-bar" onclick="seekTo(event)">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="stats" id="stats"></div>
    <div class="event-stream" id="eventStream"></div>
  </div>

  <script>
    let sessions = [];
    let currentSession = null;
    let playbackIndex = 0;
    let playing = false;
    let playbackSpeed = 1;
    let intervalId = null;

    // Fetch available sessions
    fetch('http://localhost:4243/sessions')
      .then(r => r.json())
      .then(data => {
        sessions = data;
        const select = document.getElementById('sessionSelect');
        data.forEach(s => {
          const option = document.createElement('option');
          option.value = s.sessionId;
          option.textContent = `${s.sessionId} (${s.eventCount} events, ${(s.duration/1000).toFixed(1)}s)`;
          select.appendChild(option);
        });
      })
      .catch(err => console.error('Failed to load sessions:', err));

    async function loadSession() {
      const sessionId = document.getElementById('sessionSelect').value;
      if (!sessionId) return;

      try {
        const response = await fetch(`http://localhost:4243/sessions/${sessionId}`);
        currentSession = await response.json();
        playbackIndex = 0;
        playing = false;

        document.getElementById('playBtn').disabled = false;
        document.getElementById('resetBtn').disabled = false;
        updateUI();
        renderStats();
        renderEvents();
      } catch (err) {
        alert('Failed to load session: ' + err.message);
      }
    }

    function togglePlay() {
      if (!currentSession) return;

      playing = !playing;
      document.getElementById('playBtn').textContent = playing ? '⏸ Pause' : '▶ Play';

      if (playing) {
        play();
      } else {
        clearInterval(intervalId);
      }
    }

    function play() {
      if (!currentSession || playbackIndex >= currentSession.events.length) {
        playing = false;
        document.getElementById('playBtn').textContent = '▶ Play';
        return;
      }

      const interval = 100 / playbackSpeed;
      intervalId = setInterval(() => {
        if (playbackIndex >= currentSession.events.length) {
          togglePlay();
          return;
        }

        playbackIndex++;
        updateUI();
        renderEvents();
      }, interval);
    }

    function reset() {
      playing = false;
      playbackIndex = 0;
      clearInterval(intervalId);
      document.getElementById('playBtn').textContent = '▶ Play';
      updateUI();
      renderEvents();
    }

    function updateSpeed() {
      playbackSpeed = parseFloat(document.getElementById('speedSelect').value);
      if (playing) {
        clearInterval(intervalId);
        play();
      }
    }

    function seekTo(event) {
      if (!currentSession) return;
      const rect = event.currentTarget.getBoundingClientRect();
      const percent = (event.clientX - rect.left) / rect.width;
      playbackIndex = Math.floor(percent * currentSession.events.length);
      updateUI();
      renderEvents();
    }

    function updateUI() {
      if (!currentSession) return;

      const progress = (playbackIndex / currentSession.events.length) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
      document.getElementById('progressText').textContent = `${playbackIndex} / ${currentSession.events.length}`;
    }

    function renderStats() {
      if (!currentSession) return;

      const events = currentSession.events;
      const eventTypes = {};
      events.forEach(e => {
        eventTypes[e.type] = (eventTypes[e.type] || 0) + 1;
      });

      const statsHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Events</div>
          <div class="stat-value">${events.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Duration</div>
          <div class="stat-value">${(currentSession.metadata.duration / 1000).toFixed(1)}s</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Session ID</div>
          <div class="stat-value" style="font-size: 14px;">${currentSession.sessionId}</div>
        </div>
        ${Object.entries(eventTypes).map(([type, count]) => `
          <div class="stat-card">
            <div class="stat-label">${type}</div>
            <div class="stat-value">${count}</div>
          </div>
        `).join('')}
      `;

      document.getElementById('stats').innerHTML = statsHTML;
    }

    function renderEvents() {
      if (!currentSession) return;

      const eventsHTML = currentSession.events.slice(0, playbackIndex).reverse().map((e, i) => {
        const isCurrent = (playbackIndex - 1) === (currentSession.events.length - 1 - i);
        const time = new Date(e.timestamp).toLocaleTimeString();
        return `
          <div class="event ${isCurrent ? 'event-current' : ''}">
            <span class="event-time">${time}</span>
            <span class="event-type">${e.type}</span>
            ${e.id ? `<span>${e.id}</span>` : ''}
          </div>
        `;
      }).join('');

      document.getElementById('eventStream').innerHTML = eventsHTML || '<div style="color: #808080; text-align: center; padding: 40px;">No events yet</div>';
    }
  </script>
</body>
</html>
